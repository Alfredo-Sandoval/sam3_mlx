[project]
name = "mlx-sam3p1"
version = "0.1.0"
description = "Maintained MLX port of SAM 3.1-oriented image segmentation components."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ftfy>=6.3.1",
    "huggingface-hub>=1.1.6",
    "iopath>=0.1.10",
    "mlx>=0.30.0",
    "numpy>=2.3.5",
    "pillow>=12.0.0",
    "regex>=2025.11.3",
]

[project.optional-dependencies]
convert = [
    "torch>=2.9.1",
]
notebooks = [
    "ipykernel>=7.1.0",
    "ipympl>=0.9.3",
    "ipywidgets>=8.1.8",
    "matplotlib>=3.10.8",
    "requests>=2.32.5",
]
viz = [
    "matplotlib>=3.10.8",
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["mlx_sam3p1", "mlx_sam3p1.model"]

[tool.setuptools.package-data]
mlx_sam3p1 = ["assets/*.txt.gz"]
